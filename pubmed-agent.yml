name: Update PubMed feed site

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          PUBMED_RSS_URL: ${{ secrets.PUBMED_RSS_URL }}
          SITE_TITLE: "CAR-T PubMed Monitor"
          MAX_ITEMS_ON_PAGE: "100"
        run: python Agent

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          git diff --staged --quiet || git commit -m "Update PubMed site"
          git push